version: "3.9"

services:
  chatsql:
    build: .
    image: chatsql:latest
    container_name: chatsql_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # ── Single worker is REQUIRED ────────────────────────────────
    # Session configs are stored in-process memory (Python dict).
    # Multiple workers = multiple separate dicts = random
    # "No database connected" errors when requests hit different workers.
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Optional: nginx reverse proxy ────────────────────────────
  # Uncomment the block below if you want to serve on port 80/443.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: chatsql_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - chatsql
